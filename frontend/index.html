<!doctype html>
<html lang="en" ng-app="travelPlannerApp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Planner Viewer</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./app/styles/main.css" />
  </head>
  <body ng-controller="ShellController as shell">
    <header class="topbar">
      <h1>Travel Plan Viewer</h1>
      <nav class="nav">
        <a href="#!/plans" ng-class="{active: shell.isPath('/plans')}">所有计划</a>
        <span ng-if="shell.currentPlanName" style="color:#dfeaff;">/ {{ shell.currentPlanName }}</span>
      </nav>
      <div class="mode-badge" ng-class="{admin: shell.isAdmin}" ng-if="shell.isAdmin" style="cursor:pointer;" ng-click="shell.exitAdmin()">
        编辑模式（点击退出）
      </div>
      <div class="mode-badge" ng-if="!shell.isAdmin">
        浏览模式
      </div>
    </header>
    <main ng-view></main>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin="">
    </script>
    <script src="./app/app.js"></script>
    <script src="./app/services/tripService.js"></script>
    <script src="./app/directives/leafletMap.js"></script>
    <script src="./app/controllers/plansController.js"></script>
    <script src="./app/controllers/mapController.js"></script>
  </body>
</html>
